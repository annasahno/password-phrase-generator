<!DOCTYPE html>
<html lang="ru">
  <head>
    <title>Генератор паролей</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="ProjectName — описание">
    <link rel="preload" href="/fonts/Montserrat-Bold.woff2" as="font">
    <link rel="preload" href="/fonts/Montserrat-SemiBold.woff2" as="font">
    <link rel="preload" href="/fonts/Montserrat-Medium.woff2" as="font">
    <link rel="preload" href="/fonts/Montserrat-Regular.woff2" as="font">
    <link rel="stylesheet" href="css/style.min.css">
  </head>
  <body>
    <div class="visually-hidden"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><symbol id="icon-close" viewBox="0 0 20 20"><g fill="none"><path d="M.293 18.291a1 1 0 101.414 1.414L10 11.413l8.292 8.292a1 1 0 101.414-1.414l-8.292-8.292 8.292-8.292A1 1 0 1018.291.293L9.999 8.585 1.707.293A1 1 0 10.293 1.707L8.585 10 .293 18.291z"/></g></symbol></svg></div>
    <div class="wrapper">
      <header class="header">
        <div class="container">
          <h1 class="header__title">Генератор парольных фраз</h1>
        </div>
      </header>
      <main class="main">
        <section>
          <div class="container">
            <div class="form">
              <h2 class="visually-hidden">Параметры генератора</h2>
              <ul class="form__list">
                <li class="form__item">
                  <label class="form__control">
                    <input class="visually-hidden form__input" type="radio" name="letter-count" value="3" checked><span class="form__mark-radio"></span><span class="form__label">3</span>
                  </label>
                </li>
                <li class="form__item">
                  <label class="form__control">
                    <input class="visually-hidden form__input" type="radio" name="letter-count" value="4"><span class="form__mark-radio"></span><span class="form__label">4</span>
                  </label>
                </li>
              </ul>
              <div class="form__text">символа</div>
              <ul class="form__list">
                <li class="form__item">
                  <label class="form__control">
                    <input class="visually-hidden form__input" type="radio" name="word-count" value="3" checked><span class="form__mark-radio"></span><span class="form__label">3</span>
                  </label>
                </li>
                <li class="form__item">
                  <label class="form__control">
                    <input class="visually-hidden form__input" type="radio" name="word-count" value="4"><span class="form__mark-radio"></span><span class="form__label">4</span>
                  </label>
                </li>
              </ul>
              <div class="form__text">слова</div>
              <button class="btn form__button form__button--generate" type="button">Генерировать</button>
              <button class="btn form__button form__button--copy" type="button">Скопировать</button>
              <div class="form__output"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="js/vendor.min.js"></script>
    <script src="js/main.min.js"></script>
  </body>
</html>
